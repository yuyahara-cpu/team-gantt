  for(let i=0;i<totalDays;i++){const d=new Date(minS.getTime()+i*DAY);const hn=holName(d);let c="celln"+((d.getDay()===0||d.getDay()===6)?" we":"")+(hn?" hol":"")+(ymd(d)===ymd(today)?" today":"");const cell=el("div",c,""+d.getDate());cell.style.width=COL+"px";if(hn)cell.title=hn;hdTl.appendChild(cell);}
  hd.appendChild(hdTl);box.appendChild(hd);
  function makeTrack(){const tr=el("div","track");tr.style.width=tlWidth+"px";for(let i=0;i<totalDays;i++){const d=new Date(minS.getTime()+i*DAY);const hn=holName(d);const g=el("div","gline"+((d.getDay()===0||d.getDay()===6)?" we":"")+(hn?" hol":""));g.style.left=(i*COL)+"px";g.style.width=COL+"px";tr.appendChild(g);}if(today>=minS&&today<=maxE){const t=el("div","todayline");t.style.left=(posX(today)+COL/2)+"px";tr.appendChild(t);}return tr;}
  function taskRow(t,isSub){
    const row=el("div","grow trow"+(isSub?" sub":""));
    const lc=el("div","lc");
    lc.appendChild(el("span","box"+(t.st==="完了"?" done":""),t.st==="完了"?"✓":""));
    if(isSub)lc.appendChild(el("span","sub-mark","└"));
    const dot=el("span","asgn-dot");dot.style.background=ASGNCOLOR[t.asgn]||"#9ca3af";lc.appendChild(dot);
    const nm=el("div","nm");const pr=t.pri==="高"?"p-hi":t.pri==="中"?"p-mid":"p-lo";
    nm.innerHTML=`<span class="rname" title="${esc(t.name)}">${esc(t.name)}</span><span class="rmeta"><b style="color:${ASGNCOLOR[t.asgn]||'#6b7280'}">${esc(ASGNSHORT[t.asgn]||t.asgn||'-')}</b> ・${esc(t.span||'')} ・<span class="pill ${pr}">${esc(t.pri||'-')}</span> ${esc(t.st||'')}</span>`;
    lc.appendChild(nm);
    const track=makeTrack();
    const s=deriveStart(t,today),e=deriveEnd(t,today);
    let left=posX(s),w=(Math.round((e-s)/DAY)+1)*COL;if(w<COL*0.9)w=Math.round(COL*0.9);
    const bar=el("div","bar"+(isSub?" sub":"")+(t.st==="完了"?" done":"")+((e<today&&t.st!=="完了")?" overdue":""));
    bar.style.left=left+"px";bar.style.width=w+"px";bar.style.background=ASGNCOLOR[t.asgn]||"#6b7280";
    bar.title=t.name+" ("+(t.st||"")+" / "+(t.asgn||"")+")";bar.textContent=t.name;
    track.appendChild(bar);
    row.appendChild(lc);row.appendChild(track);return row;
  }
  const childrenOf={};shown.forEach(t=>{if(t.parent){(childrenOf[t.parent]=childrenOf[t.parent]||[]).push(t);}});
  CATS.forEach(cat=>{
    const laneTasks=shown.filter(t=>t.cat===cat);if(!laneTasks.length)return;
    const parents=laneTasks.filter(t=>!t.parent);const pids=new Set(parents.map(p=>p.id));
    parents.sort((a,b)=>priRank(a.pri)-priRank(b.pri)||spanRank(a.span)-spanRank(b.span));
    const lane=el("div","grow lane");lane.appendChild(el("div","lc",`<span class="tag" style="background:${CATCOLOR[cat]}">${esc(cat)}</span> <span style="color:#9ca3af;font-weight:500;font-size:11px;">${laneTasks.length}件</span>`));
    const lt=el("div","tl");lt.style.width=tlWidth+"px";lane.appendChild(lt);box.appendChild(lane);
    parents.forEach(p=>{box.appendChild(taskRow(p,false));(childrenOf[p.id]||[]).sort((a,b)=>spanRank(a.span)-spanRank(b.span)).forEach(ch=>box.appendChild(taskRow(ch,true)));});
    laneTasks.filter(t=>t.parent&&!pids.has(t.parent)).forEach(ch=>box.appendChild(taskRow(ch,true)));
  });
  const sc=$("ganttScroll");if(sc){sc.scrollLeft=Math.max(0,posX(today)-COL*2);}
}
function buildCatChips(){const box=$("catChips");box.innerHTML="";CATS.forEach(c=>{const ch=el("span","chip",c);if(FILTER.cats.has(c)){ch.style.background=CATCOLOR[c];ch.style.borderColor=CATCOLOR[c];ch.style.color="#fff";}ch.onclick=()=>{if(FILTER.cats.has(c)){FILTER.cats.delete(c);ch.style.background="#fff";ch.style.color="#1f2430";}else{FILTER.cats.add(c);ch.style.background=CATCOLOR[c];ch.style.color="#fff";}render();};box.appendChild(ch);});}
function buildAsgnChips(){const box=$("asgnChips");box.innerHTML="";[["all","全員","#111827"]].concat(MEMBERS.map(m=>[m,ASGNSHORT[m],ASGNCOLOR[m]])).forEach(([val,label,color])=>{const ch=el("span","chip"+(FILTER.asgn===val?" active":""),label);if(FILTER.asgn===val){ch.style.background=color;ch.style.borderColor=color;ch.style.color="#fff";}ch.onclick=()=>{FILTER.asgn=val;buildAsgnChips();render();};box.appendChild(ch);});}
$("hideDone").onclick=()=>{FILTER.hideDone=!FILTER.hideDone;$("hideDone").classList.toggle("active",FILTER.hideDone);render();};
buildCatChips();buildAsgnChips();
let rt;window.addEventListener("resize",()=>{clearTimeout(rt);rt=setTimeout(render,200);});
render();
</script>
</body>
</html>
